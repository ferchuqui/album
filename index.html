<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Panini - Fifa World Cup 2026</title>

    <!-- Google Fonts para las fuentes de apoyo -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <!-- Enlace a tu CSS externo -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="album-container">
        
        <!-- PANEL IZQUIERDO: TAPA TRASERA (CONTRAPORTADA) -->
        <div class="panel left-panel">
            <div class="left-image-container">
                <img src="images/tapatrasera.jpg" alt="Tapa Trasera del Álbum" class="left-image">
                <div class="left-footer ">
                    <img src="images/fifa26.png" alt="Fifa 26" class="fifa26">
                    <div class="legal-text">
                        © FIFA, FIFA's Official Licensed Product Logos, and the Emblems, Mascots, Posters and Trophies
                        of the FIFA World Cup™ tournaments are copyrights and/or trademarks of FIFA. Manufactured under
                        licence by PANINI S.p.A.
                    </div>
                    <div class="panini-mini">
                        <img src="images/logopanini.png" alt="Logo Panini" srcset="">
                       
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL DERECHO: PORTADA PRINCIPAL (FRENTE) -->
        <div class="panel right-panel">
            <img src="images/frente.jpg" alt="Frente del Album" class="right-image">
        </div>

    </div>
</body>

</html>
